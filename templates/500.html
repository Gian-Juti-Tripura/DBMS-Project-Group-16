{% extends "base.html" %}

{% block title %}500 - Internal Server Error{% endblock %}

{% block content %}
<div class="container">
    <div class="error-page">
        <div class="error-code">500</div>
        <div class="error-message">Something went wrong on our end.</div>
        <p class="text-muted">
            We're experiencing some technical difficulties. Please try again later or contact support if the problem persists.
        </p>
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="btn btn-primary me-3">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="javascript:location.reload()" class="btn btn-secondary">
                <i class="fas fa-refresh"></i> Try Again
            </a>
        </div>
    </div>
</div>
{% endblock %}
