{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container">
    <div class="error-page">
        <div class="error-code">404</div>
        <div class="error-message">Oops! The page you're looking for doesn't exist.</div>
        <p class="text-muted">
            The page you requested could not be found. It might have been moved, deleted, or you entered the wrong URL.
        </p>
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="btn btn-primary me-3">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
